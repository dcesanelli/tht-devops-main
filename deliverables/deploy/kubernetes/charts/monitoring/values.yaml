                  "pluginVersion": "9.1.0",
                  "targets": [
                    {
                      "datasource": "Prometheus",
                      "expr": "100 - (sum(rate(http_requests_total{status=~\"[45]..\"}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service)) * 100",
